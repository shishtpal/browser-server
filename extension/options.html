<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings — History Tracker</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      max-width: 480px;
      margin: 0 auto;
      padding: 32px 24px;
    }
    h1 {
      font-size: 20px;
      font-weight: 600;
      color: #e94560;
      margin-bottom: 24px;
    }
    .field {
      margin-bottom: 20px;
    }
    .field label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #8899aa;
      margin-bottom: 6px;
    }
    .field input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #0f3460;
      border-radius: 8px;
      background: #16213e;
      color: #e0e0e0;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
    }
    .field input:focus {
      border-color: #e94560;
    }
    .field input::placeholder {
      color: #445566;
    }
    .field .hint {
      font-size: 11px;
      color: #556677;
      margin-top: 4px;
    }
    .actions {
      display: flex;
      gap: 10px;
      margin-top: 28px;
    }
    .actions button {
      flex: 1;
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .actions button:hover {
      opacity: 0.85;
    }
    #btn-save {
      background: #e94560;
      color: #fff;
    }
    #btn-reset {
      background: #16213e;
      color: #8899aa;
      border: 1px solid #0f3460;
    }
    #status {
      margin-top: 16px;
      font-size: 13px;
      text-align: center;
      min-height: 20px;
      transition: opacity 0.3s;
    }
    .status-ok { color: #2ecc71; }
    .status-err { color: #e94560; }
  </style>
</head>
<body>
  <h1>Settings</h1>

  <div class="field">
    <label for="api-base">Server URL</label>
    <input type="text" id="api-base" placeholder="http://localhost:8080">
    <div class="hint">Base URL of the running browser-server instance.</div>
  </div>

  <div class="field">
    <label for="user-id">User ID</label>
    <input type="number" id="user-id" placeholder="1" min="1">
    <div class="hint">Numeric ID of the user to record history under.</div>
  </div>

  <div class="actions">
    <button id="btn-reset">Reset Defaults</button>
    <button id="btn-save">Save</button>
  </div>

  <div id="status"></div>

  <script src="options.js"></script>
</body>
</html>
