<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browser History</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 480px;
      max-height: 500px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
    }
    .header {
      background: #16213e;
      padding: 12px 16px;
      border-bottom: 1px solid #0f3460;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header h2 {
      font-size: 16px;
      font-weight: 600;
      color: #e94560;
    }
    .header .stats {
      font-size: 12px;
      color: #8899aa;
      margin-top: 4px;
    }
    #history-list {
      overflow-y: auto;
      max-height: 420px;
    }
    .entry {
      display: flex;
      align-items: center;
      padding: 8px 16px;
      border-bottom: 1px solid #16213e;
      gap: 10px;
      transition: background 0.15s;
    }
    .entry:hover { background: #16213e; }
    .entry .favicon {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      opacity: 0.7;
    }
    .entry .info {
      flex: 1;
      min-width: 0;
    }
    .entry .title {
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 2px;
    }
    .entry .url {
      font-size: 11px;
      color: #667788;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .entry .count {
      font-size: 12px;
      font-weight: 700;
      color: #e94560;
      background: rgba(233, 69, 96, 0.1);
      border-radius: 12px;
      padding: 2px 8px;
      flex-shrink: 0;
      min-width: 28px;
      text-align: center;
    }
    .empty {
      padding: 32px 16px;
      text-align: center;
      color: #556677;
      font-size: 13px;
    }
    .actions {
      display: flex;
      gap: 8px;
      padding: 8px 16px;
      border-top: 1px solid #16213e;
      background: #16213e;
      position: sticky;
      bottom: 0;
    }
    .actions button {
      flex: 1;
      padding: 6px 12px;
      border: 1px solid #0f3460;
      border-radius: 6px;
      background: transparent;
      color: #8899aa;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.15s;
    }
    .actions button:hover {
      background: #0f3460;
      color: #e0e0e0;
    }
    .actions button.danger:hover {
      background: #e94560;
      border-color: #e94560;
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="header">
    <h2>History Tracker</h2>
    <div class="stats" id="stats">Loading&hellip;</div>
  </div>
  <div id="history-list"></div>
  <div class="actions">
    <button id="btn-refresh">Refresh</button>
    <button id="btn-clear" class="danger">Clear All</button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
